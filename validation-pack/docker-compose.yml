# Compose file lives inside validation-pack/, but the build context is the
# pack root (..) so the Dockerfile's `COPY validation-pack/ ...` resolves.
services:
  validation:
    # Pinned to a fixed image tag so parallel `docker compose -p <name> run`
    # invocations across different project names all share the same image
    # instead of building a per-project copy (which silently cached stale code).
    # Build the image manually with:
    #   docker build -f validation-pack/Dockerfile -t validation-pack:latest ..
    image: validation-pack:latest
    user: "1000:1000"
    volumes:
      # Host credentials mounted read-only at a staging path. entrypoint.sh
      # copies to ~/.claude/.credentials.json (mode 600) so Claude Code can
      # refresh tokens on the writable in-container copy without touching the
      # host file. See validation-pack-design.md "OAuth handling".
      #
      # Snap docker note: compose's ~ and ${HOME} interpolate against snap's
      # confined HOME (e.g., /home/cwa/snap/docker/<rev>/), not the user's
      # actual home -- which silently breaks the mount (creates a directory at
      # the target). We use an absolute path with a CLAUDE_CREDS_PATH env-var
      # override for portability.
      - ${CLAUDE_CREDS_PATH:-/home/cwa/.claude/.credentials.json}:/mnt/host-claude/credentials.json:ro
    # To vary city config per iteration without rebuilding image layers, add
    # the following entry to the volumes list above and provide the override file:
    # - ./city.override.toml:/home/agent/validation-pack/city.toml:ro
    # No `command:` -- scenario id arrives via:
    #   docker compose run --rm validation <scenario-id>
