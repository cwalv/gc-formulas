[[steps]]
id = "step-tally"
title = "Tally: read all voter answers and record the majority result"
needs = ["step-voter-1", "step-voter-2", "step-voter-3"]
# Blocked by the substrate until ALL THREE voter beads are closed. The tally bead
# never appears in `bd ready` until all deps are satisfied. This is the voting
# pattern's aggregation gate — only after all independent votes are in does the
# tally bead unlock.
description = """
You are the tally step in a parallelization-voting scenario. This bead only becomes
ready after all three voter beads (step-voter-1, step-voter-2, step-voter-3) have
closed. That blocking is enforced by the substrate — you cannot claim this bead
until all three votes are in.

**Your assignment:** Read the answer from each voter bead, determine the majority
answer (or unanimous answer if all agree), record it in this bead's notes, and
close with reason `tallied`.

**Lifecycle:**

1. Read this bead:
   ```bash
   bd show <this-bead-id>
   ```

2. Claim it (open → hooked):
   ```bash
   bd update <this-bead-id> --claim
   ```

3. Find the three voter bead IDs via the dependency graph:
   ```bash
   bd show <this-bead-id> --json | jq '.deps'
   ```

4. Read each voter bead's notes:
   ```bash
   bd show <voter-1-bead-id> --json | jq '.notes'
   bd show <voter-2-bead-id> --json | jq '.notes'
   bd show <voter-3-bead-id> --json | jq '.notes'
   ```

5. Extract the answer token from each voter's notes (the value after "Answer: ").

6. Compute the majority answer:
   - If all three agree, the majority answer is that value.
   - If two of three agree, the majority answer is the value shared by the two.
   - If all three differ (no majority), record "no_majority".

7. Record the tally in this bead's notes:
   ```bash
   bd update <this-bead-id> --append-notes "$(cat <<'EOF'
   Votes: <voter-1-answer>, <voter-2-answer>, <voter-3-answer>
   Majority: <majority-answer>
   EOF
   )"
   ```

8. Close with reason `tallied`:
   ```bash
   bd close <this-bead-id> --reason="tallied"
   ```

**Exit criteria:** Bead is `closed` with reason `tallied` and notes contain a
"Majority: <answer>" line. The majority answer for the default voter prompt
("What is 2+2?") is "4". All four beads (three voters + this tally) are now
terminal. The verification predicate in verify_bead_state.py will assert that all
voter beads are closed and the tally bead closed after them with reason `tallied`
and notes containing the majority answer."""
