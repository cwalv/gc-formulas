   ```

**Exit criteria:** Bead is `closed` with reason `completed` and notes contain
exactly one haiku about red."""

[[steps]]
id = "step-slice-3"
title = "Slice 3: generate a haiku about green"
# No `needs` — independent of slice-1 and slice-2.
description = """
You are one of three parallel workers executing slice 3 of 3 in a
parallelization-sectioning scenario.

**Task template context:** {{task_template}}

**Your concrete assignment:** Generate exactly one one-line haiku about the
color green. A one-line haiku is written as a single line with the three
five-seven-five syllable phrases separated by em-dashes, e.g.:
`silent winter lake — pale moon on frozen waves — cold breath disappears`

Do not generate more than one haiku. Do not include explanation or commentary.

**Lifecycle:**

1. Read this bead:
   ```bash
   bd show <this-bead-id>
   ```

2. Claim it (open → hooked):
   ```bash
