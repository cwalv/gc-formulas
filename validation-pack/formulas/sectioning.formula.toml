[[steps]]
id = "step-join"
title = "Join: combine the three haikus into a numbered list"
needs = ["step-slice-1", "step-slice-2", "step-slice-3"]
# Blocked by the substrate until ALL THREE slice beads are closed. The join bead
# never appears in `bd ready` until all deps are satisfied. This is the
# sectioning pattern's aggregation gate.
description = """
You are the join step in a parallelization-sectioning scenario. This bead only
becomes ready after all three parallel slice beads (step-slice-1, step-slice-2,
step-slice-3) have closed. That blocking is enforced by the substrate — you
cannot claim this bead until all three slices are done.

**Your assignment:** Read the notes from each of the three slice beads and
combine their haikus into one numbered list.

**Lifecycle:**

1. Read this bead:
   ```bash
   bd show <this-bead-id>
   ```

2. Claim it (open → hooked):
   ```bash
   bd update <this-bead-id> --claim
   ```

3. Find the three slice bead IDs via the dependency graph:
   ```bash
   bd show <this-bead-id> --json | jq '.deps'
   ```

4. Read each slice bead's notes:
   ```bash
   bd show <slice-1-bead-id> --json | jq '.notes'
   bd show <slice-2-bead-id> --json | jq '.notes'
   bd show <slice-3-bead-id> --json | jq '.notes'
   ```

5. Combine the three haikus into a single numbered list (one haiku per line):
   ```
   1. <haiku from slice 1>
   2. <haiku from slice 2>
   3. <haiku from slice 3>
   ```

6. Record the numbered list in this bead's notes:
   ```bash
   bd update <this-bead-id> --append-notes "$(cat <<'EOF'
   Combined haikus:
   1. <haiku from slice 1>
   2. <haiku from slice 2>
   3. <haiku from slice 3>
   EOF
   )"
   ```

7. Close with reason `completed`:
   ```bash
   bd close <this-bead-id> --reason="completed"
   ```

**Exit criteria:** Bead is `closed` with reason `completed` and notes contain
a numbered list of all three haikus (blue, red, green). All four beads
(three slices + this join) are now terminal. The verification predicate in
verify_bead_state.py will assert that all slices are closed and the join
closed after them."""
