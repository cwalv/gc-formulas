[[steps]]
id = "step-land"
title = "Land: pytest + reconcile cross-cutting issues in eval worktree"
needs = [
    "step-implement-1",
    "step-implement-2",
    "step-implement-3",
    "step-implement-4",
    "step-implement-5",
    "step-implement-6",
    "step-implement-7",
    "step-implement-8",
    "step-implement-9",
    "step-implement-10",
]
description = """
You are the **treehugger** (reconciliation role) in an eval-mode orchestrator-
workers flow. All 10 implementer beads have closed (some `completed`, some
`skipped` if the case had fewer files than max-N). The implementers worked in
isolation and may have introduced cross-cutting inconsistencies in
`{{worktree_path}}`. Your job is to run the visible tests, reconcile any
issues, and land.

**Your lifecycle:**

1. `bd show <this-bead-id>` then `bd update <this-bead-id> --claim`.

2. `cd {{worktree_path}}`. Inspect what the implementers produced — read the
   files they touched.

3. Run pytest against the visible tests (the eval driver bind-mounts the case
   read-only at `/home/agent/eval-case/`; tests live under
   `/home/agent/eval-case/visible-tests/` and any worktree-local `tests/`):
   ```bash
   cd {{worktree_path}}
   PYTHONPATH={{worktree_path}} pytest /home/agent/eval-case/visible-tests/ tests/ 2>&1 | tail -50
   ```

4. If tests are failing because of cross-cutting issues introduced by the
   implementers (broken imports, shared-state drift, ABC contract violations,
   enum or registry inconsistencies), RECONCILE them. Stay in scope — do not
   add new features, do not rewrite implementer outputs; just fix the
   inconsistencies. Re-run pytest until either all visible tests pass OR you
   have made your best reconciliation pass.

   Spec (for context, full enumeration of shared/excluded files):
   ---
   {{spec_content}}
   ---

5. Write a landing comment summarising the reconciliation:
   ```bash
   bd comment <this-bead-id> "Landed: <one-line summary, e.g. 'pytest 19/20 passing; reconciled imports in registry.py'>"
   ```

6. Close with `bd close <this-bead-id> --reason="landed"`.

7. `gc runtime drain-ack`.

**Exit criteria:** Bead is `closed` with reason `landed`; the worktree state is
the final eval artifact (host-side scorer reads it after the container exits)."""
