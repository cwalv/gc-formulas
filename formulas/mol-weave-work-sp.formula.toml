description = """
Worker -> rig landing flow (single-pool variant).

Per-bead workweave (named by bead-id), try/finally cleanup. All steps run
in the same worker session — including the merge step. No separate refinery
pool. Use this where cross-pool worker/refinery routing isn't required.

For the cross-pool design (separate refinery pool, fresh-session judgment),
see mol-weave-work. That formula depends on fo-ssqqw substrate work to
instantiate correctly; mol-weave-work-sp is the production-viable interim.

## Vars

| Var               | Default        | Description |
|-------------------|----------------|-------------|
| issue             | (required)     | The work bead ID |
| rig_name          | foundations    | Sling target ({{rig_name}}/worker) |
| project_name      | foundations    | rwv project name (e.g., foundations, foundations-test) |
| base_branch       | main           | Per-repo base branch the workweave is cut from |
| setup_command     | ""             | Workspace-root setup; empty = skip |
| typecheck_command | ""             | Workspace-root typecheck; empty = skip |
| lint_command      | ""             | Workspace-root lint; empty = skip |
| build_command     | ""             | Workspace-root build; empty = skip |
| test_command      | ""             | Workspace-root tests; empty = skip |

## Preconditions

- city.toml `[daemon] formula_v2 = true`.
- A bead labeled `rig-merge-mutex` of type `mutex` exists in this rig's bd.
- `projects/foundations/orders/scripts/refinery-step.sh` is executable
  (canonical script location; reachable regardless of the rig's active
  project so long as the rig's workweave has a projects/foundations
  symlink or worktree).

## Concurrency notes

The merge step is load-bearing on the rig-merge-mutex: with single-pool,
multiple worker sessions can run concurrent molecules and all want to
write to the same rig. The mutex serializes merges across them. Stale-
mutex recovery still depends on fo-q0giv (orphan-recovery dog with mutex
reaping) — that's a pre-production dependency.

## Cleanup contract

`cleanup` runs after `body` reaches terminal state, regardless of outcome:
- work bead closed (merge succeeded)     -> delete per-bead workweave
- work bead reopened (merge rejected)    -> preserve workweave for resume
- work bead in_progress (mid-body abort) -> preserve workweave for inspection

## Path derivation

Each body step re-derives the per-bead workweave path (workweave name ==
bead-id, no metadata read):

  RIG_WEAVE=$(rwv resolve)
  WORKWEAVES_DIR="$(dirname "$RIG_WEAVE")"
  WORKSPACE_NAME=$(basename "$RIG_WEAVE")
  WORKSPACE_NAME="${WORKSPACE_NAME%%--*}"
  WORKWEAVE_DIR="$WORKWEAVES_DIR/$WORKSPACE_NAME--{{issue}}"
"""
formula = "mol-weave-work-sp"
version = 1
contract = "graph.v2"

[vars]
[vars.issue]
description = "The work bead ID assigned to this molecule"
required = true

[vars.rig_name]
description = "Rig name; substituted into sling target"
default = "foundations"

[vars.project_name]
description = "rwv project name; used in rwv workweave commands and PROJECT env"
default = "foundations"

[vars.base_branch]
description = "Per-repo base branch the workweave is cut from"
default = "main"

[vars.setup_command]
description = "Workspace-root setup/install command. Empty = skip."
default = ""

[vars.typecheck_command]
description = "Workspace-root typecheck command. Empty = skip."
default = ""

[vars.lint_command]
description = "Workspace-root lint command. Empty = skip."
default = ""

[vars.build_command]
description = "Workspace-root build command. Empty = skip."
default = ""

[vars.test_command]
description = "Workspace-root test command. Empty = skip."
default = ""

# === Body scope (terminal latch; cleanup runs after this regardless) ===
[[steps]]
id = "body"
title = "Worker body scope"
needs = ["workspace-setup", "preflight-tests", "implement", "self-review", "merge"]
description = """
Members may abort_scope on failure; merge rejects by exiting non-zero.
Either way, cleanup runs.
"""
metadata = { "gc.kind" = "scope", "gc.scope_name" = "worker-body", "gc.scope_role" = "body" }

# === workspace-setup ===
[[steps]]
id = "workspace-setup"
title = "Create or resume per-bead workweave"
description = """
Workweave name == bead-id.

If the bead carries `rejection_reason`, the worker is resuming -- read
it and decide how to bring the workweave forward before continuing.

```bash
RIG_WEAVE=$(rwv resolve)
WORKWEAVES_DIR="$(dirname "$RIG_WEAVE")"
WORKSPACE_NAME=$(basename "$RIG_WEAVE")
WORKSPACE_NAME="${WORKSPACE_NAME%%--*}"
WORKWEAVE_DIR="$WORKWEAVES_DIR/$WORKSPACE_NAME--{{issue}}"

if [ ! -d "$WORKWEAVE_DIR" ]; then
  cd "$RIG_WEAVE"
  rwv workweave {{project_name}} create "{{issue}}" --from "$RIG_WEAVE"
fi
cd "$WORKWEAVE_DIR"

REJECTION=$(bd show {{issue}} --json | jq -r '.[0].metadata.rejection_reason // empty')
if [ -n "$REJECTION" ]; then
  echo "RESUMING AFTER REJECTION:"
  echo "$REJECTION"
fi
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "setup", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "worker", "gc.session_affinity" = "require" }

[steps.retry]
max_attempts = 3
on_exhausted = "hard_fail"

# === preflight-tests ===
[[steps]]
id = "preflight-tests"
title = "Verify base state passes checks"
needs = ["workspace-setup"]
description = """
Confirm the workspace is healthy before implementing. Failure means the
rig is broken -- abort_scope; cleanup preserves the workweave for
inspection.

```bash
RIG_WEAVE=$(rwv resolve)
WORKWEAVES_DIR="$(dirname "$RIG_WEAVE")"
WORKSPACE_NAME=$(basename "$RIG_WEAVE")
WORKSPACE_NAME="${WORKSPACE_NAME%%--*}"
cd "$WORKWEAVES_DIR/$WORKSPACE_NAME--{{issue}}"

{{setup_command}}
{{typecheck_command}}
{{lint_command}}
{{test_command}}
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "worker", "gc.session_affinity" = "require" }

[steps.retry]
max_attempts = 3
on_exhausted = "hard_fail"

# === implement ===
[[steps]]
id = "implement"
title = "Implement the work"
needs = ["preflight-tests"]
description = """
Read `bd show {{issue}}` for the spec. Edit files; commit per repo with
descriptive messages.

DO NOT include the issue ID in commit messages.

```bash
RIG_WEAVE=$(rwv resolve)
WORKWEAVES_DIR="$(dirname "$RIG_WEAVE")"
WORKSPACE_NAME=$(basename "$RIG_WEAVE")
WORKSPACE_NAME="${WORKSPACE_NAME%%--*}"
cd "$WORKWEAVES_DIR/$WORKSPACE_NAME--{{issue}}"

bd show {{issue}}
# ... edit code, commit per repo ...
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "worker", "gc.session_affinity" = "require" }

[steps.retry]
max_attempts = 3
on_exhausted = "hard_fail"

# === self-review ===
[[steps]]
id = "self-review"
title = "Verify implementation; hard-fail on residue"
needs = ["implement"]
description = """
Re-run quality checks. Hard-fail on uncommitted state -- no autocommit
fallback.

```bash
RIG_WEAVE=$(rwv resolve)
WORKWEAVES_DIR="$(dirname "$RIG_WEAVE")"
WORKSPACE_NAME=$(basename "$RIG_WEAVE")
WORKSPACE_NAME="${WORKSPACE_NAME%%--*}"
cd "$WORKWEAVES_DIR/$WORKSPACE_NAME--{{issue}}"

{{setup_command}}
{{typecheck_command}}
{{lint_command}}
{{build_command}}
{{test_command}}

# Hard-fail on uncommitted residue (manifest repos via rwv, project repo
# checked directly).
REPOS=$(rwv status --json | jq -r '.[].path')
DIRTY=""
for repo in $REPOS "projects/{{project_name}}"; do
  if [ -n "$(git -C "$repo" status --porcelain 2>/dev/null)" ]; then
    echo "FAIL: uncommitted state in $repo"
    git -C "$repo" status
    DIRTY=1
  fi
done
[ -z "$DIRTY" ] || exit 1
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "worker", "gc.session_affinity" = "require" }

[steps.retry]
max_attempts = 3
on_exhausted = "hard_fail"

# === merge -- judgment-bearing, runs in the same worker session ===
[[steps]]
id = "merge"
title = "Merge with bias toward rejection (single-pool: same session that did the work)"
needs = ["self-review"]
description = """
Same session that did the work now serves as the merger. Switch hats:
apply judgment with bias toward rejection (you wrote it; that's a
confirmation-bias hazard). Invoke the deterministic merge script as a
tool; reject on any structural concern the script can't see.

Rejection writes status + metadata + assignee in a SINGLE atomic
`bd update`; do not use `gc sling` for the state transition. Reject is
mechanically equivalent to abort -- exit non-zero so the body scope
aborts and cleanup preserves the workweave.

```bash
WORK="{{issue}}"
RIG_WEAVE=$(rwv resolve)
WORKWEAVES_DIR="$(dirname "$RIG_WEAVE")"
WORKSPACE_NAME=$(basename "$RIG_WEAVE")
WORKSPACE_NAME="${WORKSPACE_NAME%%--*}"
PEER_WEAVE="$WORKWEAVES_DIR/$WORKSPACE_NAME--$WORK"

# 1. Acquire mutex with retry. Lookup by label (no --status filter so we
#    find the bead even when held). Wait up to ~150s for a holder to
#    release. Stale-mutex recovery is fo-q0giv's job.
MUTEX_ID=$(bd list --label=rig-merge-mutex --type=mutex --json | jq -r '.[0].id // empty')
[ -z "$MUTEX_ID" ] && { echo "FAIL: no rig-merge-mutex bead"; exit 1; }
attempts=0
until bd update "$MUTEX_ID" --claim 2>/dev/null; do
  attempts=$((attempts+1))
  if [ "$attempts" -ge 30 ]; then
    echo "FAIL: could not acquire rig-merge-mutex after 30 retries"
    exit 1
  fi
  sleep 5
done

# 2. Invoke deterministic script.
RESULT_JSON=$(mktemp)
WORK="$WORK" RIG_WEAVE="$RIG_WEAVE" PEER_WEAVE="$PEER_WEAVE" \\
  PROJECT="{{project_name}}" TEST_CMD="{{test_command}}" \\
  STRUCTURED_OUTPUT="$RESULT_JSON" \\
  "$RIG_WEAVE/projects/foundations/orders/scripts/refinery-step.sh"

# 3. Agent applies judgment. On ACCEPT:
#       bd close "$WORK" --reason "merged: <summary>"
#       REJECTED=""
#    On REJECT (atomic):
#       TARGET=$(bd show "$WORK" --json | jq -r '.[0].metadata."gc.routed_from" // "{{rig_name}}/worker"')
#       bd update "$WORK" --status=open \\
#         --set-metadata rejection_reason="$REASON" \\
#         --set-metadata gc.routed_to="$TARGET" --assignee=
#       REJECTED="yes"

# 4. Release mutex (always).
bd update "$MUTEX_ID" --assignee=

[ "$REJECTED" = "yes" ] && exit 1
exit 0
```
"""
metadata = { "gc.scope_ref" = "body", "gc.scope_role" = "member", "gc.on_fail" = "abort_scope", "gc.continuation_group" = "worker", "gc.session_affinity" = "require" }

[steps.retry]
max_attempts = 1
on_exhausted = "hard_fail"

# === cleanup (try/finally; runs after body terminal regardless) ===
[[steps]]
id = "cleanup"
title = "Tear down workweave only on confirmed success"
needs = ["body"]
description = """
Workweave deletion only when the work bead is closed. Reject and
mid-body abort both preserve the workweave for resume / inspection.

```bash
RIG_WEAVE=$(rwv resolve)
WORKWEAVES_DIR="$(dirname "$RIG_WEAVE")"
WORKSPACE_NAME=$(basename "$RIG_WEAVE")
WORKSPACE_NAME="${WORKSPACE_NAME%%--*}"
WORK_STATUS=$(bd show {{issue}} --json | jq -r '.[0].status')

if [ "$WORK_STATUS" = "closed" ]; then
  cd "$RIG_WEAVE"
  rwv workweave {{project_name}} delete "{{issue}}" || \\
    echo "WARN: workweave teardown failed for {{issue}}"
else
  echo "preserving workweave $WORKSPACE_NAME--{{issue}} (status=$WORK_STATUS)"
fi
```
"""
metadata = { "gc.kind" = "cleanup", "gc.scope_role" = "teardown" }

[steps.retry]
max_attempts = 1
on_exhausted = "hard_fail"
