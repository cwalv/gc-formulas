description = """
Weave-base formula — shared workspace lifecycle for all workweave variants.

This is the thin base. It establishes the per-bead workweave, records
it on the bead, and handles rejection-aware resume. Code-authoring
steps (preflight-tests, implement, self-review) live in the sibling
formula `mol-weave-do-work` — extend that when your variant authors
code. Extend `mol-weave-base` directly when your variant ships
already-authored artifacts (upstream submission, followup fixups,
cleanup/inspection flows).

Every step that operates on code assumes:

  $PWD                          # workweave root, NOT a git repo
    .rwv-active                 # active project name
    .rwv-workweave              # pointer to primary weave
    .beads -> ...               # symlinked project bead store
    github/<owner>/<repo>/      # per-repo git worktrees (git ops here)
    projects/<project>/         # worktree of the project repo
    go.work, Cargo.toml, ...    # ecosystem files (generated by rwv)

Discovery is `rwv resolve`, not `git rev-parse --show-toplevel`.
Per-repo git commands `cd` into `github/<owner>/<repo>/` first.
Cross-repo state is captured by `rwv lock` writing `projects/<project>/rwv.lock`.

## Variables

| Variable | Source | Description |
|----------|--------|-------------|
| issue | caller | The work bead ID assigned to this agent |
| base_branch | caller | Base branch per repo (default: main) |
| setup_command | rig config | Workspace-root setup command. Empty = skip. |

All `*_command` vars run from the weave root (`$(rwv resolve)`).
For per-repo commands use `cd github/<owner>/<repo> && <cmd>`."""
formula = "mol-weave-base"
version = 2

[vars]
[vars.issue]
description = "The work bead ID assigned to this agent"
required = true

[vars.base_branch]
description = "Per-repo base branch that the workweave's ephemeral branches derive from"
default = "main"

[vars.setup_command]
description = "Workspace-root setup/install command. Runs from $(rwv resolve). Empty = skip."
default = ""

[[steps]]
id = "load-context"
title = "Load context and verify weave assignment"
description = """
Initialize your session, confirm you are in a workweave, and understand
the assignment.

**1. Prime your environment:**
```bash
gc prime
bd prime
```

**2. Confirm the weave context:**
```bash
WEAVE=$(rwv resolve)             # workweave root path
cd "$WEAVE"
test -f .rwv-workweave || {
  echo "FATAL: $WEAVE is not a workweave — no .rwv-workweave marker"
  exit 1
}
rwv prime                         # summary: project, repos, roles
```
`rwv resolve` is the canonical way to find the workspace root. Do NOT use
`git rev-parse --show-toplevel` at the weave root — it's not a git repo.
Every per-repo `git` command runs after `cd github/<owner>/<repo>`.

**3. Read the work bead:**
```bash
bd show {{issue}}
bd show {{issue}} --json | jq '.metadata'
```

**4. Check for rejection (IMPORTANT):**

If `metadata.rejection_reason` exists, a previous attempt was rejected
by the refinery. Read the reason. Common cases:

- Rebase conflict in repo X → resume in that workweave, rebase, fix
- Test failure → resume, diagnose, fix

If `metadata.workweave` exists, a workweave name is already recorded
from the prior attempt; `workspace-setup` uses it.

**5. Check inbox:**
```bash
gc mail inbox
# Read HANDOFF / assignment messages, archive once absorbed
```

**6. Understand the work:**
- Which repos under `github/<owner>/<repo>/` does this touch?
- What does the bead's file-path reference translate to? (Paths in bead
  descriptions are relative to the weave root and traverse into
  `github/<owner>/<repo>/path/to/file`.)
- What does "done" look like?
- If rejected: exactly what needs fixing?

If blocked, mail the mayor:
```bash
gc mail send mayor -s "HELP: unclear requirements for {{issue}}" \\
  -m "Question: <what you need clarified>"
```

**Exit criteria:** You're in the workweave, you understand the work."""

[[steps]]
id = "workspace-setup"
title = "Discover or create per-bead workweave; handle rejection-aware resume"
needs = ["load-context"]
description = """
Find (resume) or create (fresh) a peer workweave **scoped to this bead**
(named `{{issue}}`), cd into it, record the path on the bead, and
handle rebase-aware resume for rejected work.

This step is the canonical per-bead workspace lifecycle. Every
descendant formula inherits it; variants that need a different shape
(e.g. the followup formula checking out an existing PR branch on top)
add a sibling step that runs AFTER this one.

**Config: base_branch = {{base_branch}}**
**Config: setup_command = {{setup_command}}**

**1. Discover or create the per-bead workweave.**

Workweaves are scoped to the work bead, not the agent. This means an
agent can pick up new work even if an old workweave is being recovered,
multiple workers run concurrently without collision, and the witness
cleans workweaves per-bead.

```bash
PROJECT=$(cat "$(rwv resolve)/.rwv-active")
WORKWEAVE="{{issue}}"
WORKWEAVE_DIR=$(bd show {{issue}} --json | jq -r '.metadata.work_dir // empty')
if [ -z "$WORKWEAVE_DIR" ] || [ ! -d "$WORKWEAVE_DIR" ]; then
  # Idempotent: preserves an existing workweave's non-git state.
  WORKWEAVE_DIR=$(rwv workweave --hook-mode "$PROJECT" create "$WORKWEAVE")
fi
cd "$WORKWEAVE_DIR"
bd update {{issue}} \\
  --set-metadata workweave="$WORKWEAVE" \\
  --set-metadata work_dir="$WORKWEAVE_DIR"
```
Recording early means witness recovery and the refinery can find your
workweave if you crash. Subsequent steps assume cwd is `$WORKWEAVE_DIR`
— re-`cd "$WORKWEAVE_DIR"` at the start of any step that runs in a
fresh shell.

**2. Fetch latest for every repo:**
```bash
for repo in github/*/*/; do
  (cd "$repo" && git fetch --prune origin) || true
done
(cd projects/*/ && git fetch --prune origin 2>/dev/null) || true
```

**3. Rejection-aware resume.**

```bash
REJECTION=$(bd show {{issue}} --json | jq -r '.metadata.rejection_reason // empty')
if [ -n "$REJECTION" ]; then
  # Per-repo rebase on the recorded target.
  TARGET=$(bd show {{issue}} --json | jq -r '.metadata.target // "{{base_branch}}"')
  for repo in github/*/*/; do
    cd "$repo"
    BRANCH=$(git branch --show-current)
    # Only rebase if the ephemeral branch actually exists on this repo.
    if git show-ref --verify --quiet "refs/heads/$BRANCH"; then
      git rebase "origin/$TARGET" || {
        echo "Conflict in $repo — resolve, then git rebase --continue"
        exit 1
      }
    fi
    cd - >/dev/null
  done
  bd update {{issue}} --unset-metadata rejection_reason
fi
```
If a rebase conflict stops you: resolve it, `git rebase --continue`,
then move on. Don't redo unrelated work.

**4. Confirm clean state per repo:**
```bash
for repo in github/*/*/; do
  (cd "$repo" && git status --porcelain && git status | head -3)
done
```
Expect clean trees on ephemeral branches (unless resuming mid-implement).

**5. Run weave-root setup (if configured):**
```bash
cd "$WORKWEAVE_DIR"
{{setup_command}}
```
Empty `setup_command` → skip.

**Exit criteria:** In a peer workweave on per-repo `<workweave>/<base>`
branches, any prior rebase conflicts resolved, `metadata.workweave` and
`metadata.work_dir` recorded on the bead."""
